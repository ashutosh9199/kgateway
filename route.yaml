apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fit-route
  namespace: ashutosh-ns
spec:
  parentRefs:
    - name: demo-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /fit
      backendRefs:
        - name: fit-svc
          port: 5000
---
